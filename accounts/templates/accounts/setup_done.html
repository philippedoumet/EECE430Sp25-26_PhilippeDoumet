<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volley Manager — Setup Complete</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
  </style>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow-lg border-0 text-center" style="width:420px;">

    <div class="card-header text-white text-center py-4 border-0"
         style="background: linear-gradient(135deg,#0f3460,#533483);">
      <div class="mb-2"><i class="fas fa-volleyball-ball fa-3x text-warning"></i></div>
      <h3 class="mb-0 fw-bold">Volley Manager</h3>
      <small class="opacity-75">Setup Complete</small>
    </div>

    <div class="card-body p-4">
      <div class="mb-3">
        <i class="fas fa-check-circle fa-4x text-success"></i>
      </div>
      <h5 class="fw-bold">Superuser created successfully!</h5>
      <p class="text-muted small mb-4">
        You can now sign in and access the Owner Portal, the Django Admin, and manage the entire system.
      </p>
      <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="fas fa-sign-in-alt me-2"></i>Go to Login
      </a>
    </div>

    <div class="card-footer text-center text-muted small py-3 bg-light">
      <i class="fas fa-shield-alt me-1"></i> EECE 430 — Volleyball Club Management
    </div>
  </div>
</body>
</html>
