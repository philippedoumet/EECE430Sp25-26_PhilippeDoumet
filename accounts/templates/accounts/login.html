<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volley Manager — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
  </style>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow-lg border-0" style="width:420px;">
    <div class="card-header text-white text-center py-4 border-0"
         style="background: linear-gradient(135deg,#0f3460,#533483);">
      <div class="mb-2"><i class="fas fa-volleyball-ball fa-3x text-warning"></i></div>
      <h3 class="mb-0 fw-bold">Volley Manager</h3>
      <small class="opacity-75">Club Management System</small>
    </div>
    <div class="card-body p-4">
      {% if error %}
      <div class="alert alert-danger py-2"><i class="fas fa-exclamation-triangle me-2"></i>{{ error }}</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
      </form>
    </div>
    <div class="card-footer text-center text-muted small py-3 bg-light">
      <i class="fas fa-shield-alt me-1"></i> EECE 430 — Volleyball Club Management
    </div>
  </div>
</body>
</html>
