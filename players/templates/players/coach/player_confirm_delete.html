{% extends 'players/coach/base.html' %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-5">
  <div class="card shadow-sm border-danger">
    <div class="card-body text-center py-5">
      <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
      <h4>Remove "{{ object.name }}" from roster?</h4>
      <p class="text-muted">This action cannot be undone.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-4">
        {% csrf_token %}<button type="submit" class="btn btn-danger px-4">Yes, Remove</button>
        <a href="{% url 'coach_player_list' %}" class="btn btn-secondary px-4">Cancel</a>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
