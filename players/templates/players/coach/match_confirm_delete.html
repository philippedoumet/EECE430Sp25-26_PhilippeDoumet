{% extends 'players/coach/base.html' %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-5">
  <div class="card shadow-sm border-danger">
    <div class="card-body text-center py-5">
      <i class="fas fa-trash fa-3x text-danger mb-3"></i>
      <h4>Delete match vs {{ object.opponent }}?</h4>
      <p class="text-muted">{{ object.date|date:"M d, Y H:i" }}</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-4">
        {% csrf_token %}<button type="submit" class="btn btn-danger px-4">Delete</button>
        <a href="{% url 'match_list' %}" class="btn btn-secondary px-4">Cancel</a>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
