{% extends 'players/coach/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-header bg-white fw-semibold"><i class="fas fa-user me-2 text-success"></i>{{ title }}</div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            {% for field in form %}
            <div class="col-md-6">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
            </div>
            {% endfor %}
          </div>
          <div class="d-flex gap-2 mt-4 pt-3 border-top">
            <button type="submit" class="btn btn-success px-4">Save Player</button>
            <a href="{% url 'coach_player_list' %}" class="btn btn-light">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
