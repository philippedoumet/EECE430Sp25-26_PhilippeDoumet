{% extends 'players/owner/base.html' %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-5">
  <div class="card shadow-sm border-danger">
    <div class="card-body text-center py-5">
      <i class="fas fa-trash fa-3x text-danger mb-3"></i>
      <h4>Delete this expense?</h4>
      <p class="text-muted">{{ object.get_category_display }} — ${{ object.amount }} — {{ object.date }}</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-4">
        {% csrf_token %}<button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'expense_list' %}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
