{% extends 'players/owner/base.html' %}
{% block title %}Delete Season{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-5">
  <div class="card shadow-sm border-danger">
    <div class="card-body text-center py-5">
      <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
      <h4>Delete Season "{{ object.name }}"?</h4>
      <p class="text-muted">This will also delete all matches, trainings, expenses and transfers linked to this season.</p>
      <form method="post" class="mt-4 d-flex gap-2 justify-content-center">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'season_list' %}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
