<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volley Players</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Automatically style Django's default form outputs */
        form input, form select, form textarea {
            display: block; width: 100%; padding: .375rem .75rem;
            font-size: 1rem; border: 1px solid #ced4da;
            border-radius: .375rem; margin-bottom: 1rem;
        }
        form label { font-weight: bold; margin-bottom: .25rem; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'player_list' %}">🏐 Volley Manager</a>
        </div>
    </nav>
    <div class="container">
        <div class="card shadow-sm p-4 border-0">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
